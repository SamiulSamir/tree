<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus Tracker</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        /* Base Body Styling */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%), radial-gradient(at 100% 0%, hsl(339deg 10.83% 6.77%) 0, transparent 50%);
            background-attachment: fixed;
            background-size: cover;
            color: #e2e8f0;
            min-height: 100vh;
            margin: 0;
            padding: 0.5rem;
            overflow-x: hidden;
        }

        @media (min-width: 768px) {
            body { padding: 1rem; }
        }

        /* Typography & Header */
        header {
            margin-bottom: 1rem;
            text-align: center;
        }

        .main-title {
            font-size: 1.5rem;
            font-weight: 700;
            background-image: linear-gradient(to right, #60a5fa, #67e8f9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.025em;
            margin: 0 0 0.25rem 0;
        }

        @media (min-width: 768px) {
            .main-title { font-size: 1.875rem; }
        }

        .header-subtitle {
            color: #94a3b8;
            font-weight: 300;
            font-size: 0.75rem;
            margin: 0;
        }

        /* Grid Layout */
        #tracker-container {
            display: grid;
            grid-template-columns: repeat(1, minmax(0, 1fr));
            gap: 0.75rem;
            max-width: 1920px;
            margin: 0 auto;
            height: calc(100vh - 100px);
        }

        @media (min-width: 768px) {
            #tracker-container { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        @media (min-width: 1280px) {
            #tracker-container { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: rgba(17, 25, 40, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0.75rem;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
            transition: box-shadow 0.3s, border-color 0.3s;
        }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0.5rem;
            padding: 0.375rem;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
        }

        /* Subject Components */
        .subject-header-wrapper {
            margin-bottom: 0.75rem;
        }

        .subject-header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 0.25rem;
        }

        .subject-title {
            font-size: 1.125rem;
            font-weight: 700;
            color: white;
            margin: 0;
        }

        .subject-percent {
            font-size: 10px;
            font-family: monospace;
            color: #22d3ee;
        }

        /* Papers Components */
        .papers-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.5rem;
            height: 100%;
            overflow: hidden;
        }

        .paper-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .paper-header-wrapper {
            margin-bottom: 0.5rem;
        }

        .paper-title {
            font-size: 10px;
            font-weight: 600;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 0 0 0.125rem 0;
        }

        .paper-count {
            color: #22d3ee;
            margin-left: 0.125rem;
        }

        /* Progress Bars */
        .progress-bar-fill {
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-bar-container-subject {
            width: 100%;
            background-color: rgba(51, 65, 85, 0.5);
            border-radius: 9999px;
            height: 0.375rem;
            overflow: hidden;
            display: flex;
        }

        .progress-bar-container-paper {
            width: 100%;
            background-color: rgba(51, 65, 85, 0.3);
            border-radius: 9999px;
            height: 0.25rem;
            display: flex;
            overflow: hidden;
        }

        .subject-progress-red, .paper-progress-red { background-color: #33ff00; height: 100%; }
        .subject-progress-blue, .paper-progress-blue { background-color: #00869e; height: 100%; }

        /* Chapter Items */
        .chapter-item {
            cursor: pointer;
            padding: 0.375rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            user-select: none;
        }

        .chapter-item.status-complete {
            background-color: rgb(115 255 33 / 37%);
            border-color: rgb(0 255 41);
            color: #fee2e2;
            text-shadow: 0 0 2px #000000;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.15);
        }

        .chapter-item.status-attended {
            background-color: rgba(22, 78, 99, 0.3);
            border-color: rgba(6, 182, 212, 0.3);
            color: #cffafe;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.1);
        }

        .chapter-item.status-none {
            background-color: rgba(30, 41, 59, 0.4);
            border-color: rgba(51, 65, 85, 0.5);
            color: #94a3b8;
        }

        .chapter-item.status-none:hover {
            background-color: rgba(51, 65, 85, 0.5);
            color: #e2e8f0;
        }

        .chapter-icon {
            font-size: 0.75rem;
            transition: color 0.3s;
            flex-shrink: 0;
        }

        .icon-complete { color: #00ffb3; }
        .icon-attended { color: #22d3ee; }
        .icon-none { color: #64748b; }

        .chapter-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 100%;
        }

        .chapter-text.font-medium {
            font-weight: 500;
        }

        /* State Classes */
        .subject-complete-red {
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4) !important;
        }

        .subject-complete-blue {
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.15);
            border-color: rgba(34, 211, 238, 0.3) !important;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1); 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(56, 189, 248, 0.3); 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(56, 189, 248, 0.5); 
        }
        
        /* Animation for moving items */
        .just-moved {
            animation: slideDownFlash 0.6s ease-out;
            z-index: 10;
        }

        @keyframes slideDownFlash {
            0% { 
                transform: translateY(20px); 
                background-color: rgba(255, 255, 255, 0.1);
                opacity: 0;
            }
            100% { 
                transform: translateY(0); 
                opacity: 1; 
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <h1 class="main-title">
            Syllabus Tracker
        </h1>
        <p class="header-subtitle">Click once for (Blue), twice for (Red)</p>
    </header>

    <!-- Main Grid -->
    <div id="tracker-container">
        <!-- Subjects will be injected here via JS -->
    </div>

    <!-- Template for Subject Column (Hidden) -->
    <template id="subject-template">
        <div class="glass-panel">
            <!-- Subject Header -->
            <div class="subject-header-wrapper">
                <div class="subject-header-top">
                    <h2 class="subject-title">Subject Name</h2>
                    <span class="subject-percent">0%</span>
                </div>
                <!-- Subject Progress Bar Container -->
                <div class="progress-bar-container-subject">
                    <div class="subject-progress-red progress-bar-fill" style="width: 0%"></div>
                    <div class="subject-progress-blue progress-bar-fill" style="width: 0%"></div>
                </div>
            </div>

            <!-- Papers Container -->
            <div class="papers-container">
                <!-- Paper 1 -->
                <div class="paper1-wrapper paper-wrapper">
                    <div class="paper-header-wrapper">
                        <h3 class="paper-title">
                            Paper 1 <span class="paper1-count paper-count">(0%)</span>
                        </h3>
                        <div class="progress-bar-container-paper">
                            <div class="paper1-progress-red paper-progress-red progress-bar-fill" style="width: 0%"></div>
                            <div class="paper1-progress-blue paper-progress-blue progress-bar-fill" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="paper1-list glass-card">
                        <!-- Chapters go here -->
                    </div>
                </div>

                <!-- Paper 2 -->
                <div class="paper2-wrapper paper-wrapper">
                    <div class="paper-header-wrapper">
                        <h3 class="paper-title">
                            Paper 2 <span class="paper2-count paper-count">(0%)</span>
                        </h3>
                        <div class="progress-bar-container-paper">
                            <div class="paper2-progress-red paper-progress-red progress-bar-fill" style="width: 0%"></div>
                            <div class="paper2-progress-blue paper-progress-blue progress-bar-fill" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="paper2-list glass-card">
                        <!-- Chapters go here -->
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script>
        // --- DATA DEFINITIONS (Topic Based) ---
        const topicsDB = {
            'HM-1': [
                { name: "ম্যাট্রিক্স ও নির্ণায়ক", topics: 36 },
                { name: "ভেক্টর", topics: 18 },
                { name: "সরলরেখা", topics: 48 },
                { name: "বৃত্ত", topics: 33 },

                { name: "ত্রিকোণমিতিক অনুপাত", topics: 31 },
                { name: "সংযুক্ত ও যৌগিক কোণের ত্রিকোণমিতিক অনুপাত", topics: 43 },
                { name: "ফাংশন ও ফাংশনের লেখচিত্র", topics: 32 },
                { name: "অন্তরীকরণ", topics: 48 },
                { name: "যোগজীকরণ", topics: 53 }
            ],
            'HM-2': [
                { name: "বাস্তব সংখ্যা ও অসমতা", topics: 20 },
                { name: "যোগাশ্রয়ী প্রোগ্রাম", topics: 16 },
                { name: "জটিল সংখ্যা", topics: 30 },
                { name: "বহুপদী ও বহুপদী সমীকরণ", topics: 40 },
                { name: "দ্বিপদী বিস্তৃতি", topics: 38 },
                { name: "কণিক", topics: 45 },
                { name: "বিপরীত ত্রিকোণমিতিক ফাংশন ও ত্রিকোণমিতিক সমীকরণ", topics: 36 },
                { name: "স্থিতিবিদ্যা", topics: 43 },
                { name: "সমতলে বস্তুকণার গতি", topics: 37 },
                { name: "বিস্তার পরিমাপ ও সম্ভাবনা", topics: 24 }
            ],
            'PHY-1': [
                { name: "ভৌত বিজ্ঞান ও পরিমাপ", topics: 8 },
                { name: "ভেক্টর", topics: 52 },
                { name: "গতিবিদ্যা", topics: 40 },
                { name: "নিউটনিয়ান বলবিদ্যা", topics: 58 },
                { name: "কাজ, ক্ষমতা, ও শক্তি", topics: 44 },
                { name: "মহাকর্ষ ও অভিকর্ষ", topics: 39 },
                { name: "পদার্থের গাঠনিক ধর্ম", topics: 39 },
                { name: "পর্যায়বৃত্ত গতি", topics: 49 },
                { name: "তরঙ্গ", topics: 35 },
                { name: "আদর্শ গ্যাস ও গ্যাসের গতিতত্ত্ব", topics: 37 }
            ],
            'PHY-2': [
                { name: "তাপগতিবিদ্যা", topics: 47 },
                { name: "স্থির তড়িৎ", topics: 44 },
                { name: "চল তড়িৎ", topics: 48 },
                { name: "তড়িৎ প্রবাহের চৌম্বক ক্রিয়া ও চৌম্বকত্ব", topics: 30 },
                { name: "তড়িৎচৌম্বকীয় আবেশ", topics: 26 },
                { name: "জ্যামিতিক আলোকবিজ্ঞান", topics: 32 },
                { name: "ভৌত আলোকবিজ্ঞান", topics: 32 },
                { name: "আধুনিক পদার্থ বিজ্ঞান", topics: 34 },
                { name: "পরমাণুর মডেল ও নিউক্লিয়ার পদার্থবিজ্ঞান", topics: 34 },
                { name: "সেমিকন্ডাক্টর ও ইলেক্ট্রনিক্স", topics: 34 },
                { name: "জ্যোতির্বিজ্ঞান", topics: 12 }
            ],
            'CHEM-1': [
                { name: "ল্যাবরেটরির নিরাপদ ব্যবহার", topics: 20 },
                { name: "গুণগত রসায়ন", topics: 30 },
                { name: "মৌলের পর্যায়বৃত্ত ধর্ম ও রাসায়নিক বন্ধন", topics: 47 },
                { name: "রাসায়নিক পরিবর্তন", topics: 40 },
                { name: "কর্মমুখী রসায়ন", topics: 24 }
            ],
            'CHEM-2': [
                { name: "পরিবেশ রসায়ন", topics: 33 },
                { name: "জৈব যৌগ", topics: 87 },
                { name: "পরিমাণগত রসায়ন", topics: 29 },
                { name: "তড়িৎ রসায়ন", topics: 33 },
                { name: "অর্থনৈতিক রসায়ন", topics: 38 }
            ],
            'BIO-1': [
                { name: "কোষ ও এর গঠন", topics: 25 },
                { name: "কোষ বিভাজন", topics: 19 },
                { name: "কোষ রসায়ন", topics: 20 },
                { name: "অণুজীব", topics: 14 },
                { name: "শৈবাল ও ছত্রাক", topics: 18 },
                { name: "ব্রায়োফাইটা ও টেরিডোফাইটা", topics: 12 },
                { name: "নগ্নবীজী ও আবৃতবীজী উদ্ভিদ", topics: 15 },
                { name: "টিসু ও টিসুতন্ত্র", topics: 18 },
                { name: "উদ্ভিদ শরীরতত্ত্ব", topics: 30 },
                { name: "উদ্ভিদ প্রজনন", topics: 12 },
                { name: "জীব প্রযুক্তি", topics: 10 },
                { name: "বিস্তার ও সংরক্ষণ, জীবের পরিবেশ", topics: 12 }
            ],
            'BIO-2': [
                { name: "প্রাণীর বিভিন্নতা ও শ্রেণিবিন্যাস", topics: 18 },
                { name: "প্রাণীর পরিচিতি", topics: 25 },
                { name: "পরিপাক ও শোষণ", topics: 15 },
                { name: "রক্ত সঞ্চালন", topics: 18 },
                { name: "শ্বসন ও শ্বাসক্রিয়া", topics: 12 },
                { name: "বর্জ্য নিষ্কাশন", topics: 10 },
                { name: "চলন ও অঙ্গচালনা", topics: 12 },
                { name: "সমন্বয় ও নিয়ন্ত্রণ", topics: 20 },
                { name: "মানব জীবনের ধারাবাহিকতা", topics: 15 },
                { name: "মানবদেহের প্রতিরক্ষা", topics: 12 },
                { name: "জিনতত্ত্ব ও বিবর্তন", topics: 18 },
                { name: "প্রাণীর আচরণ", topics: 10 }
            ]
        };

        const syllabusData = [
            {
                name: "Higher Math",
                p1: topicsDB['HM-1'],
                p2: topicsDB['HM-2']
            },
            {
                name: "Physics",
                p1: topicsDB['PHY-1'],
                p2: topicsDB['PHY-2']
            },
            {
                name: "Chemistry",
                p1: topicsDB['CHEM-1'],
                p2: topicsDB['CHEM-2']
            },
            {
                name: "Biology",
                p1: topicsDB['BIO-1'],
                p2: topicsDB['BIO-2']
            }
        ];

        // --- APP STATE MANAGEMENT ---

        const STORAGE_KEY = 'syllabus_tracker_v2'; 
        
        function loadState() {
            const stored = localStorage.getItem(STORAGE_KEY);
            return stored ? JSON.parse(stored) : {};
        }

        function saveState(state) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        const appState = loadState();

        const STATUS_NONE = 0;
        const STATUS_ATTENDED = 1; // Blue
        const STATUS_COMPLETE = 2; // Red

        function getStatus(subject, paper, chapter) {
            const key = `${subject}-${paper}-${chapter}`;
            const val = appState[key];
            
            if (val === true) return STATUS_ATTENDED;
            if (val === false || val === undefined) return STATUS_NONE;
            
            return val; 
        }

        function cycleStatus(subject, paper, chapter) {
            const current = getStatus(subject, paper, chapter);
            const key = `${subject}-${paper}-${chapter}`;
            
            let next = STATUS_NONE;
            if (current === STATUS_NONE) next = STATUS_ATTENDED;
            else if (current === STATUS_ATTENDED) next = STATUS_COMPLETE;
            else if (current === STATUS_COMPLETE) next = STATUS_NONE;

            appState[key] = next;
            saveState(appState);
            
            renderAll(subject, paper, chapter); 
        }

        // --- RENDERING LOGIC ---

        function renderAll(clickedSubject = null, clickedPaper = null, clickedChapter = null) {
            const container = document.getElementById('tracker-container');
            container.innerHTML = ''; 
            const template = document.getElementById('subject-template');

            syllabusData.forEach(subject => {
                const clone = template.content.cloneNode(true);
                clone.querySelector('.subject-title').textContent = subject.name;

                // --- Calculate Stats based on Topics ---
                const processPaper = (chapters, paperNum, listClass, redBarClass, blueBarClass, countClass, wrapperClass) => {
                    const listEl = clone.querySelector(listClass);
                    const wrapperEl = clone.querySelector(wrapperClass);

                    // Hide container if there are no chapters (e.g. ICT Paper 2)
                    if (!chapters || chapters.length === 0) {
                        wrapperEl.style.display = 'none';
                        return { totalTopics: 0, attendedTopics: 0, completeTopics: 0 };
                    }

                    let attendedTopics = 0;
                    let completeTopics = 0;
                    let totalTopics = 0;

                    const chapterObjects = chapters.map(chap => ({
                        name: chap.name,
                        topics: chap.topics,
                        status: getStatus(subject.name, paperNum, chap.name)
                    }));

                    chapterObjects.sort((a, b) => b.status - a.status);

                    chapterObjects.forEach(chapObj => {
                        totalTopics += chapObj.topics;
                        if (chapObj.status === STATUS_ATTENDED) attendedTopics += chapObj.topics;
                        if (chapObj.status === STATUS_COMPLETE) completeTopics += chapObj.topics;

                        const item = document.createElement('div');
                        const isJustClicked = clickedSubject === subject.name && clickedPaper === paperNum && clickedChapter === chapObj.name;

                        let classes = `chapter-item `;
                        let iconClass = "far fa-circle icon-none";
                        
                        if (chapObj.status === STATUS_COMPLETE) {
                            classes += 'status-complete ';
                            iconClass = "fas fa-check-circle icon-complete";
                        } else if (chapObj.status === STATUS_ATTENDED) {
                            classes += 'status-attended ';
                            iconClass = "fas fa-check-circle icon-attended";
                        } else {
                            classes += 'status-none ';
                        }

                        if (isJustClicked) classes += 'just-moved ';
                        item.className = classes;
                        
                        const icon = document.createElement('i');
                        icon.className = `chapter-icon ${iconClass}`;
                        
                        const text = document.createElement('span');
                        text.textContent = chapObj.name;
                        text.className = `chapter-text ${chapObj.status !== STATUS_NONE ? 'font-medium' : ''}`;
                        
                        item.appendChild(icon);
                        item.appendChild(text);

                        item.onclick = () => cycleStatus(subject.name, paperNum, chapObj.name);
                        listEl.appendChild(item);
                    });

                    const percentRed = totalTopics > 0 ? (completeTopics / totalTopics) * 100 : 0;
                    const percentBlue = totalTopics > 0 ? (attendedTopics / totalTopics) * 100 : 0;
                    const paperDisplayPercent = Math.round(percentRed + percentBlue);

                    clone.querySelector(countClass).textContent = `(${paperDisplayPercent}%)`;
                    clone.querySelector(redBarClass).style.width = `${percentRed}%`;
                    clone.querySelector(blueBarClass).style.width = `${percentBlue}%`;
                    
                    return { totalTopics, attendedTopics, completeTopics };
                };

                const p1Stats = processPaper(
                    subject.p1, '1st', 
                    '.paper1-list', '.paper1-progress-red', '.paper1-progress-blue', '.paper1-count', '.paper1-wrapper'
                );
                const p2Stats = processPaper(
                    subject.p2, '2nd', 
                    '.paper2-list', '.paper2-progress-red', '.paper2-progress-blue', '.paper2-count', '.paper2-wrapper'
                );

                // Adjust grid column if only 1 paper exists (e.g. ICT)
                if(subject.p2.length === 0) {
                    clone.querySelector('.paper1-wrapper').style.gridColumn = "span 2 / span 2";
                }

                // --- Overall Stats ---
                const totalSubjectTopics = p1Stats.totalTopics + p2Stats.totalTopics;
                const totalSubjectAttended = p1Stats.attendedTopics + p2Stats.attendedTopics;
                const totalSubjectComplete = p1Stats.completeTopics + p2Stats.completeTopics;
                
                const totalPercentRed = totalSubjectTopics > 0 ? (totalSubjectComplete / totalSubjectTopics) * 100 : 0;
                const totalPercentBlue = totalSubjectTopics > 0 ? (totalSubjectAttended / totalSubjectTopics) * 100 : 0;
                
                const displayPercent = Math.round(totalPercentRed + totalPercentBlue);

                clone.querySelector('.subject-percent').textContent = `${displayPercent}%`;
                clone.querySelector('.subject-progress-red').style.width = `${totalPercentRed}%`;
                clone.querySelector('.subject-progress-blue').style.width = `${totalPercentBlue}%`;

                if (displayPercent === 100) {
                    const card = clone.querySelector('.glass-panel');
                    if (totalSubjectComplete === totalSubjectTopics) {
                        card.classList.add('subject-complete-red'); 
                    } else {
                        card.classList.add('subject-complete-blue'); 
                    }
                }

                container.appendChild(clone);
            });
        }

        document.addEventListener('DOMContentLoaded', () => renderAll());

    </script>
</body>
</html>
